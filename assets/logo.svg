<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景：地球圆形 -->
  <circle cx="100" cy="100" r="90" fill="#4a7c59" stroke="#2d5016" stroke-width="4"/>
  
  <!-- 陆地：抽象叶子形状 -->
  <path d="M100 20 Q60 80 80 140 Q100 160 120 140 Q140 80 100 20" fill="#7cb342" opacity="0.9"/>
  
  <!-- 小动物：兔子轮廓 -->
  <ellipse cx="60" cy="130" rx="15" ry="10" fill="#fff" opacity="0.8"/>
  <circle cx="55" cy="115" r="5" fill="#fff" opacity="0.8"/>
  
  <!-- 小动物：鸟轮廓 -->
  <path d="M150 70 Q160 65 170 70 Q165 75 150 70" fill="#fff" opacity="0.8"/>
  
  <!-- 鱼 -->
  <ellipse cx="140" cy="150" rx="12" ry="6" fill="#64b5f6" opacity="0.7"/>
  <path d="M152 150 L160 145 L160 155 Z" fill="#64b5f6" opacity="0.7"/>
  
  <!-- 蝴蝶（象征蝴蝶效应） -->
  <path d="M100 90 Q85 70 70 85 Q85 95 100 90" fill="#f48fb1" opacity="0.8"/>
  <path d="M100 90 Q115 70 130 85 Q115 95 100 90" fill="#f48fb1" opacity="0.8"/>
  <line x1="100" y1="90" x2="100" y2="100" stroke="#333" stroke-width="2"/>
  
  <!-- 文字：E -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">EcoWorld</text>
</svg>