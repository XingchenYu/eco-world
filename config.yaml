# EcoWorld 配置文件 - 扩展版

# 地图设置
world:
  width: 2560
  height: 1920
  grid_size: 20  # 每个格子大小

# 时间系统
time:
  tick_interval: 100  # 毫秒
  day_length: 24      # tick数 = 1天
  season_length: 30   # 天数 = 1季节

# 环境设置
environment:
  grass_growth_rate: 0.02  # 草生长速度
  water_tiles: 100         # 水源格子数量
  initial_grass: 500       # 初始草数量

# 植物设置
plants:
  grass:
    max_age: 100
    growth_rate: 0.03
    spread_radius: 2
  bush:
    max_age: 150
    growth_rate: 0.015
    spread_radius: 3
  flower:
    max_age: 50
    growth_rate: 0.04
    spread_radius: 1
  moss:
    max_age: 80
    growth_rate: 0.02
    spread_radius: 1

# 动物设置
animals:
  insect:
    max_age: 30
    hunger_rate: 0.5
    reproduction_rate: 0.1
    speed: 1.5
  rabbit:
    max_age: 60
    hunger_rate: 0.3
    reproduction_rate: 0.05
    speed: 2.0
    vision_range: 5
  fox:
    max_age: 80
    hunger_rate: 0.4
    reproduction_rate: 0.03
    speed: 3.0
    vision_range: 8
  deer:
    max_age: 120
    hunger_rate: 0.25
    reproduction_rate: 0.03
    speed: 2.0
    vision_range: 8
  mouse:
    max_age: 40
    hunger_rate: 0.4
    reproduction_rate: 0.2
    speed: 1.8
    vision_range: 4
  bird:
    max_age: 50
    hunger_rate: 0.35
    reproduction_rate: 0.06
    speed: 4.0
    vision_range: 12
  snake:
    max_age: 70
    hunger_rate: 0.3
    reproduction_rate: 0.05
    speed: 2.0
    vision_range: 5
  bee:
    max_age: 25
    hunger_rate: 0.6
    reproduction_rate: 0.1
    speed: 3.0
    vision_range: 6

# 初始种群 - 游戏开始时自动创建所有生物
initial_population:
  # === 陆地植物 ===
  grass: 500
  bush: 150
  flower: 200
  moss: 100
  # 新增植物
  tree: 80
  vine: 120
  cactus: 60
  berry: 100
  mushroom: 150
  fern: 120
  # 果类植物
  apple_tree: 100
  cherry_tree: 80
  grape_vine: 150
  strawberry: 200
  blueberry: 150
  orange_tree: 80
  watermelon: 100
  
  # === 陆地动物 ===
  insects: 200
  rabbits: 150
  foxes: 50
  deer: 30
  mouse: 100
  bird: 60
  snake: 30
  bee: 80
  # 新增鸟类
  eagle: 20
  owl: 30
  duck: 50
  swan: 30
  sparrow: 140
  parrot: 40
  kingfisher: 30
  magpie: 80
  crow: 50
  woodpecker: 60
  hummingbird: 100
  # 新增哺乳动物
  squirrel: 120
  hedgehog: 80
  bat: 80
  raccoon: 60
  # 天敌
  wolf: 30
  spider: 100
  # 新增杂食动物
  bear: 40
  wild_boar: 100
  badger: 80
  raccoon_dog: 60
  skunk: 80
  opossum: 100
  coati: 60
  armadillo: 60
  
  # === 水生生物 ===
  algae: 300
  seaweed: 150
  plankton: 400
  # 鱼类
  small_fish: 150
  minnow: 120
  carp: 80
  catfish: 50
  large_fish: 30
  pufferfish: 40
  blackfish: 40
  pike: 30
  # 甲壳类
  shrimp: 200
  crab: 60
  # 两栖类
  frog: 80
  tadpole: 80
  water_strider: 100

# 显示设置
display:
  show_grid: true
  show_stats: true
  background_color: "#1a3a1a"
